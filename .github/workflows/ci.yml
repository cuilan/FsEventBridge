name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Node.js 20 将不再作为默认运行时；让所有 JS Actions 预先使用 Node 24，消除弃用警告。
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]

    steps:
      - uses: actions/checkout@v5

      - name: Install build & test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            build-essential \
            pkg-config \
            liburing-dev \
            libsystemd-dev \
            python3

      - name: Configure & build
        run: |
          cmake -S . -B build
          cmake --build build -j"$(nproc)"

      - name: Unit tests (no privilege)
        run: bash tests/run.sh --type unit

      - name: E2E tests (privileged via sudo)
        run: |
          # GitHub-hosted Ubuntu runners support fanotify when invoked with sudo.
          # 在受限环境（fanotify 不可用）时，run.sh 会以 SKIP 退出（rc=77）
          set +e
          sudo -E env "PATH=$PATH" bash tests/run.sh --type e2e
          rc=$?
          set -e
          if [ "$rc" -eq 77 ]; then
            echo "::warning::e2e suite skipped (fanotify unavailable on this runner)"
            exit 0
          fi
          exit "$rc"

      - name: ctest summary
        run: ctest --test-dir build --output-on-failure || true
